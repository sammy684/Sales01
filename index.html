<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建案分析儀表板</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{--primary:#1d4ed8;--primary-dark:#1e3a8a;--primary-light:#eff6ff;--bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--green:#059669;--green-bg:#d1fae5;--yellow:#b45309;--yellow-bg:#fef3c7;--red:#dc2626;--red-bg:#fee2e2;--radius:12px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    header{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);color:#fff;padding:24px 40px;display:flex;align-items:center;gap:16px}
    header .logo{font-size:32px}
    header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
    header p{font-size:13px;opacity:.75;margin-top:3px}
    main{max-width:1200px;margin:0 auto;padding:24px 20px}
    .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .upload-card{background:var(--surface);border:2px dashed #cbd5e1;border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s,box-shadow .2s}
    .upload-card:hover{border-color:var(--primary);box-shadow:0 0 0 4px #dbeafe}
    .upload-card.done{border-color:var(--green);border-style:solid}
    .upload-card .icon{font-size:36px;margin-bottom:8px}
    .upload-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
    .upload-card .desc{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5}
    .pick-btn{display:inline-block;padding:7px 18px;background:var(--primary);color:#fff;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none}
    input[type="file"]{display:none}
    .file-list{margin-top:10px;text-align:left}
    .file-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);padding:2px 0}
    .file-item span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .calc-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;margin-bottom:24px}
    .calc-btn:hover:not(:disabled){background:var(--primary-dark);transform:translateY(-1px)}
    .calc-btn:active:not(:disabled){transform:translateY(0)}
    .calc-btn:disabled{background:#94a3b8;cursor:not-allowed}
    .feat-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
    .feat-btn{padding:12px 28px;border:none;background:none;font-size:15px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s}
    .feat-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
    .feat-btn:hover:not(.active){color:var(--text)}
    #results{display:none}
    .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);text-align:center}
    .stat-card .s-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px}
    .stat-card .s-val{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
    .dim-tabs{display:flex;gap:6px;background:#e2e8f0;padding:5px;border-radius:10px;width:fit-content}
    .dim-btn{padding:8px 24px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .18s}
    .dim-btn.active{background:var(--surface);color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .search-box{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:200px;outline:none;transition:border-color .15s}
    .search-box:focus{border-color:var(--primary)}
    .row-count{font-size:12px;color:var(--muted)}
    .tool-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--muted)}
    .tool-btn:hover{background:#f8fafc}
    .table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:600px}
    thead th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
    thead th:not(:first-child){text-align:right}
    /* Group header for stacked columns */
    thead.two-row th{padding:6px 12px}
    td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f1f5f9}
    td:not(:first-child){text-align:right}
    tr:last-child td{border-bottom:none}
    .r-total td{font-weight:800;font-size:14px;background:var(--primary-light);color:var(--primary-dark)}
    .r-lv0{cursor:pointer;transition:background .15s}
    .r-lv0:hover td{background:#f8fafc}
    .r-lv0 td{font-weight:700}
    .r-lv0.open .toggle{transform:rotate(90deg);background:#bfdbfe}
    .r-lv1{transition:background .1s}
    .r-lv1.hidden{display:none}
    .r-lv1 td{font-weight:500}
    .r-lv1 td:first-child{padding-left:26px}
    .r-lv1.expandable{cursor:pointer}
    .r-lv1.expandable:hover td{background:#fafafa}
    .r-lv1.open .toggle{transform:rotate(90deg);background:#bfdbfe}
    .r-lv2{transition:background .1s}
    .r-lv2.hidden{display:none}
    .r-lv2 td{color:var(--muted);font-size:12px}
    .r-lv2 td:first-child{padding-left:50px}
    .r-lv2:hover td{background:#fafafa}
    .toggle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:#e0e7ff;color:var(--primary);font-size:9px;margin-right:7px;transition:background .15s,transform .2s;vertical-align:middle;flex-shrink:0}
    /* Separator between column groups */
    .sep-col{border-left:2px solid var(--border)!important}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
    .badge-high{background:var(--green-bg);color:var(--green)}
    .badge-mid{background:var(--yellow-bg);color:var(--yellow)}
    .badge-low{background:var(--red-bg);color:var(--red)}
    .badge-none{color:#9ca3af;font-size:12px}
    /* Purple badge for 有価値 */
    .badge-val-high{background:#f3e8ff;color:#7e22ce}
    .badge-val-mid{background:#faf5ff;color:#9333ea}
    .badge-val-low{background:#fdf4ff;color:#a855f7}
    .bar-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
    .bar-bg{width:60px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;flex-shrink:0}
    .bar-fill{height:100%;border-radius:3px}
    .bar-high{background:var(--green)}.bar-mid{background:#f59e0b}.bar-low{background:var(--red)}
    .bar-val-high{background:#7e22ce}.bar-val-mid{background:#9333ea}.bar-val-low{background:#a855f7}
    .num-link{cursor:pointer;color:var(--primary);font-weight:700;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
    .num-link:hover{color:var(--primary-dark);text-decoration-style:solid}
    .val-link{cursor:pointer;color:#7e22ce;font-weight:700;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
    .val-link:hover{color:#5b21b6;text-decoration-style:solid}
    .rev-link{cursor:pointer;color:var(--text);font-weight:500;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
    .rev-link:hover{color:var(--primary)}
    .num-zero{color:#9ca3af}
    .g-pos{color:var(--green);font-weight:700}.g-neg{color:var(--red);font-weight:700}.g-na{color:#9ca3af}
    .error-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;color:var(--red);font-size:13px;margin-bottom:14px}
    /* Modal */
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
    #modal-overlay.open{display:flex}
    #modal-box{background:var(--surface);border-radius:16px;width:540px;max-width:92vw;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .18s ease}
    @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    #modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 0;flex-shrink:0}
    #modal-title{font-size:15px;font-weight:700;flex:1;padding-right:10px}
    #modal-close{width:30px;height:30px;border:none;background:#f1f5f9;border-radius:8px;font-size:15px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
    #modal-close:hover{background:#e2e8f0}
    #modal-sub{padding:4px 22px 0;font-size:11px;color:var(--muted);flex-shrink:0}
    #modal-search-wrap{padding:10px 22px;flex-shrink:0}
    #modal-search{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none}
    #modal-search:focus{border-color:var(--primary)}
    #modal-list{overflow-y:auto;flex:1;padding:0 22px 6px}
    .mod-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;font-size:13px}
    .mod-item:nth-child(odd){background:#f8fafc}
    .mod-idx{min-width:26px;font-size:10px;font-weight:700;color:var(--muted);text-align:right;flex-shrink:0}
    .mod-name{flex:1}
    .mod-rev-val{font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;min-width:90px;text-align:right;flex-shrink:0}
    .mod-empty{text-align:center;color:var(--muted);padding:24px 0;font-size:13px}
    .mod-total-row{display:flex;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--border);font-weight:700;font-size:13px;color:var(--text);margin-top:4px}
    #modal-footer{padding:8px 22px 14px;flex-shrink:0;font-size:11px;color:var(--muted);text-align:center}
    @media(max-width:640px){.upload-grid{grid-template-columns:1fr}.stats-bar{grid-template-columns:1fr}header{padding:20px}}
  </style>
</head>
<body>
<header>
  <div class="logo">🏗️</div>
  <div>
    <h1>建案分析儀表板</h1>
    <p>滲透率分析 &amp; 客單價成長率 ｜ 業務維度 × 縣市維度 ｜ 點擊數字查看明細</p>
  </div>
</header>
<main>
  <div class="upload-grid">
    <div class="upload-card" id="card-raw" onclick="document.getElementById('inp-raw').click()">
      <div class="icon">📊</div><h3>RAW 業績報表 2026</h3>
      <p class="desc">上傳「RAW業績報表_2026_已簽約業績_MMDD.xlsx」<br>滲透率 + 客單價皆使用</p>
      <div class="pick-btn">選擇檔案</div>
      <input type="file" id="inp-raw" accept=".xlsx,.xls" onchange="onRaw(this)">
      <div class="file-list" id="lst-raw"></div>
    </div>
    <div class="upload-card" id="card-online" onclick="document.getElementById('inp-online').click()">
      <div class="icon">🏢</div><h3>在線建案數（滲透率專用）</h3>
      <p class="desc">可上傳多份月份檔（可多選）<br>僅滲透率需要，可選擇性上傳</p>
      <div class="pick-btn">選擇檔案（可多選）</div>
      <input type="file" id="inp-online" accept=".xlsx,.xls" multiple onchange="onOnline(this)">
      <div class="file-list" id="lst-online"></div>
    </div>
  </div>
  <button class="calc-btn" id="calc-btn" onclick="doCalc()" disabled>▶ 計算分析</button>
  <div id="error-area"></div>
  <div id="results">
    <div class="feat-tabs">
      <button class="feat-btn active" id="fb-pen" onclick="switchFeature('pen')">🔍 滲透率</button>
      <button class="feat-btn" id="fb-unit" onclick="switchFeature('unit')">💰 客單價成長率</button>
    </div>
    <!-- 滲透率 -->
    <div id="sec-pen">
      <div class="stats-bar">
        <div class="stat-card"><div class="s-label">合作建案數</div><div class="s-val" id="s-coop">-</div></div>
        <div class="stat-card"><div class="s-label">在線建案數（全部）</div><div class="s-val" id="s-online">-</div></div>
        <div class="stat-card"><div class="s-label">整體滲透率（全部）</div><div class="s-val" id="s-rate">-</div></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <div class="dim-tabs">
          <button class="dim-btn active" id="tab-pen-ag" onclick="switchPenDim('ag')">📋 業務維度</button>
          <button class="dim-btn" id="tab-pen-cn" onclick="switchPenDim('cn')">🗺️ 縣市維度</button>
        </div>
        <div style="flex:1"></div>
        <input class="search-box" id="pen-search" type="text" placeholder="🔍 搜尋…" oninput="onPenSearch(this.value)">
      </div>
      <div class="toolbar">
        <span class="row-count" id="pen-count"></span>
        <div style="display:flex;gap:6px">
          <button class="tool-btn" onclick="penExpandAll()">全部展開</button>
          <button class="tool-btn" onclick="penCollapseAll()">全部摺疊</button>
        </div>
      </div>
      <div class="table-wrap">
        <div id="view-pen-ag"></div>
        <div id="view-pen-cn" style="display:none"></div>
      </div>
    </div>
    <!-- 客單價 -->
    <div id="sec-unit" style="display:none">
      <div class="stats-bar">
        <div class="stat-card"><div class="s-label">2025 整體客單價</div><div class="s-val" id="u-p25">-</div></div>
        <div class="stat-card"><div class="s-label">2026 整體客單價</div><div class="s-val" id="u-p26">-</div></div>
        <div class="stat-card"><div class="s-label">整體成長率</div><div class="s-val" id="u-growth">-</div></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <div class="dim-tabs">
          <button class="dim-btn active" id="tab-unit-ag" onclick="switchUnitDim('ag')">📋 業務維度</button>
          <button class="dim-btn" id="tab-unit-cn" onclick="switchUnitDim('cn')">🗺️ 縣市維度</button>
        </div>
        <div style="flex:1"></div>
        <input class="search-box" id="unit-search" type="text" placeholder="🔍 搜尋…" oninput="onUnitSearch(this.value)">
      </div>
      <div class="toolbar">
        <span class="row-count" id="unit-count"></span>
        <div style="display:flex;gap:6px">
          <button class="tool-btn" onclick="unitExpandAll()">全部展開</button>
          <button class="tool-btn" onclick="unitCollapseAll()">全部摺疊</button>
        </div>
      </div>
      <div class="table-wrap">
        <div id="view-unit-ag"></div>
        <div id="view-unit-cn" style="display:none"></div>
      </div>
    </div>
  </div>
</main>
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-head"><div id="modal-title"></div><button id="modal-close" onclick="closeModal()">✕</button></div>
    <div id="modal-sub"></div>
    <div id="modal-search-wrap"><input id="modal-search" type="text" placeholder="🔍 搜尋建案名稱…" oninput="filterModal(this.value)"></div>
    <div id="modal-list"></div>
    <div id="modal-footer"></div>
  </div>
</div>

function parseRaw(wb){

    if(!u||String(u).trim()===''||String(u).trim()==='(無)')continue;

    const agent=x?String(x).trim():'(未知業務)',team=y?String(y).trim():'(未分組)';
    const rev=revCols.reduce((s,ci)=>s+(typeof r[ci]==='number'?r[ci]:0),0);
    const dk=county+'|'+district;
    allPR[proj]=(allPR[proj]||0)+rev;allRev+=rev;
    if(!agents[agent])agents[agent]={team,allPR:{},allRev:0,districts:{}};
    agents[agent].allPR[proj]=(agents[agent].allPR[proj]||0)+rev;agents[agent].allRev+=rev;
    if(!agents[agent].districts[dk])agents[agent].districts[dk]={PR:{},rev:0,county,district};
    agents[agent].districts[dk].PR[proj]=(agents[agent].districts[dk].PR[proj]||0)+rev;agents[agent].districts[dk].rev+=rev;
    if(!counties[county])counties[county]={PR:{},rev:0,districts:{}};
    counties[county].PR[proj]=(counties[county].PR[proj]||0)+rev;counties[county].rev+=rev;
    if(!counties[county].districts[district])counties[county].districts[district]={PR:{},rev:0};
    counties[county].districts[district].PR[proj]=(counties[county].districts[district].PR[proj]||0)+rev;counties[county].districts[district].rev+=rev;
  }
  const teams={};
  for(const[ag,d]of Object.entries(agents)){const tm=d.team;if(!teams[tm])teams[tm]={PR:{},rev:0};for(const[p,r]of Object.entries(d.allPR))teams[tm].PR[p]=(teams[tm].PR[p]||0)+r;teams[tm].rev+=d.allRev}
  return{total:{n:Object.keys(allPR).length,rev:Math.round(allRev),PR:allPR},
    teams:Object.fromEntries(Object.entries(teams).map(([t,d])=>[t,{n:Object.keys(d.PR).length,rev:Math.round(d.rev),PR:d.PR}])),
    agents:Object.fromEntries(Object.entries(agents).map(([ag,d])=>[ag,{team:d.team,n:Object.keys(d.allPR).length,rev:Math.round(d.allRev),PR:d.allPR,districts:Object.fromEntries(Object.entries(d.districts).map(([dk,dd])=>[dk,{n:Object.keys(dd.PR).length,rev:Math.round(dd.rev),PR:dd.PR,county:dd.county,district:dd.district}]))}])),
    counties:Object.fromEntries(Object.entries(counties).map(([c,d])=>[c,{n:Object.keys(d.PR).length,rev:Math.round(d.rev),PR:d.PR,districts:Object.fromEntries(Object.entries(d.districts).map(([dist,dd])=>[dist,{n:Object.keys(dd.PR).length,rev:Math.round(dd.rev),PR:dd.PR}]))}]))}
}

// ── Parse 在線建案數 → returns {allMap, valuableMap} ──
function parseOnline(wb){
  const ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  let hi=0;for(let i=0;i<4;i++){if(rows[i]&&String(rows[i][0]).trim()==='建案名稱'){hi=i;break}}
  const h=rows[hi];
  const ic=h.findIndex(v=>v&&String(v).includes('縣市')),id=h.findIndex(v=>v&&(String(v).includes('區域')||String(v).includes('行政區')));
  // Column B (index 1) = 建案類型
  const iType=h.findIndex(v=>v&&String(v).includes('建案類型'));
  const cC=ic>=0?ic:5,cD=id>=0?id:6,cT=iType>=0?iType:1;
  const allM=new Map(),valM=new Map();
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r)continue;const name=r[0];if(!name||String(name).trim()==='')continue;
    const k=String(name).trim(),type=r[cT]?String(r[cT]).trim():'';
    const info={county:r[cC]?String(r[cC]).trim():null,district:r[cD]?String(r[cD]).trim():null};
    if(!allM.has(k))allM.set(k,info);
    if(type==='有价值'&&!valM.has(k))valM.set(k,info);
  }
  return{allM,valM}
}

function buildOBD(map){const o={};for(const[n,i]of map){const c=i.county||'(未知縣市)',d=i.district||'(未知區域)';if(!o[c])o[c]={};if(!o[c][d])o[c][d]=new Set();o[c][d].add(n)}return o}
function buildOBC(obd){const o={};for(const[c,ds]of Object.entries(obd)){o[c]={total:0,districts:{}};for(const[d,ns]of Object.entries(ds)){o[c].districts[d]=ns.size;o[c].total+=ns.size}}return o}
function buildTD(){const t={};for(const r of rawRecords){const tm=r.team||'(未分組)',ag=r.agent||'(未知業務)',cnt=r.county,dst=r.district;if(!t[tm])t[tm]={projects:new Set(),agents:{}};t[tm].projects.add(r.project);if(!t[tm].agents[ag])t[tm].agents[ag]={projects:new Set(),districts:{}};t[tm].agents[ag].projects.add(r.project);if(cnt||dst){const dk=(cnt||'')+'|'+(dst||'');if(!t[tm].agents[ag].districts[dk])t[tm].agents[ag].districts[dk]={projects:new Set(),county:cnt,district:dst};t[tm].agents[ag].districts[dk].projects.add(r.project)}}return t}
function buildCBC(){const c={};for(const r of rawRecords){const co=r.county||'(未知縣市)',d=r.district||'(未知區域)';if(!c[co])c[co]={projects:new Set(),districts:{}};c[co].projects.add(r.project);if(!c[co].districts[d])c[co].districts[d]=new Set();c[co].districts[d].add(r.project)}return c}

// online project Sets at each level
function dOP(c,d,obd){return(c&&d&&obd[c]?.[d])||new Set()}
function agOP(ag,obd){const s=new Set();for(const di of Object.values(ag.districts))for(const p of dOP(di.county,di.district,obd))s.add(p);return s}
function tmOP(td,obd){const s=new Set(),seen=new Set();for(const ag of Object.values(td.agents))for(const[dk,di]of Object.entries(ag.districts))if(!seen.has(dk)){seen.add(dk);for(const p of dOP(di.county,di.district,obd))s.add(p)}return s}

const TO=['業務一組','業務二組','業務三組','業務四組','業務五組'];
function sortTeams(ks){return ks.sort((a,b)=>{const ia=TO.indexOf(a),ib=TO.indexOf(b);return(ia>=0&&ib>=0)?ia-ib:a.localeCompare(b,'zh-TW')})}

function penAgTable(td,allCoop,obd,vbd){
  let rows=penTR('全體合計',allCoop,new Set(onlineMap.keys()),new Set(valuableMap.keys()));
  for(const tm of sortTeams(Object.keys(td))){
    const t=td[tm],tid='ptm_'+sid(tm);
    const tmOL=tmOP(t,obd),tmVL=tmOP(t,vbd);
    rows+=penL0(tid,tm,t.projects,tmOL,tmVL);
    for(const[ag,ad]of Object.entries(t.agents).sort((a,b)=>b[1].projects.size-a[1].projects.size)){
      const aid='pag_'+tid+'_'+sid(ag);
      const agOL=agOP(ad,obd),agVL=agOP(ad,vbd);
      rows+=penL1(aid,tid,ag,ad.projects,agOL,agVL);
      for(const[,di]of Object.entries(ad.districts).sort((a,b)=>b[1].projects.size-a[1].projects.size)){
        const doL=dOP(di.county,di.district,obd),dvL=dOP(di.county,di.district,vbd);
        const lbl=[di.county,di.district].filter(Boolean).join(' · ');
        rows+=penL2(aid,lbl,di.projects,doL,dvL)
      }
    }
  }
  return penTW('分組',rows)
}

function penCnTable(obc,obd,vbd,cbc,allCoop){
  let rows=penTR('全台合計',allCoop,new Set(onlineMap.keys()),new Set(valuableMap.keys()));
  for(const county of Object.keys(obc).sort((a,b)=>obc[b].total-obc[a].total)){
    const cid='pcn_'+sid(county);
    const cOL=new Set(),cVL=new Set();
    for(const ns of Object.values(obd[county]||{}))ns.forEach(p=>cOL.add(p));
    for(const ns of Object.values(vbd[county]||{}))ns.forEach(p=>cVL.add(p));
    rows+=penL0(cid,county,cbc[county]?.projects||new Set(),cOL,cVL);
    for(const[dist,dOnl]of Object.entries(obc[county].districts).sort((a,b)=>b[1]-a[1])){
      const doL=obd[county]?.[dist]||new Set(),dvL=vbd[county]?.[dist]||new Set();
      rows+=penL1c(cid,dist,cbc[county]?.districts[dist]||new Set(),doL,dvL)
    }
  }
  return penTW('地區',rows)
}

}
function uL0(id,l,d25,d26,sc){const p25=d25.n?Math.round(d25.rev/d25.n):0,p26=d26.n?Math.round(d26.rev/d26.n):0;const k25n=storeNames(get25Names(sc)),k25r=storeRevs(get25PR(sc)),k26n=storeNames(get26Names(sc)),k26r=storeRevs(get26PR(sc));return`<tr class="r-lv0" id="row_${id}" onclick="toggle('${id}')"><td><span class="toggle">▶</span>${l}</td><td>${nc(d25.n,k25n,l+' 2025','coop')}</td><td>${rc(d25.rev,k25r,l+' 2025業績')}</td><td>${d25.n?fmt(p25):'<span class="g-na">-</span>'}</td><td>${nc(d26.n,k26n,l+' 2026','coop')}</td><td>${rc(d26.rev,k26r,l+' 2026業績')}</td><td>${d26.n?fmt(p26):'<span class="g-na">-</span>'}</td><td>${growthBadge(p25,p26,d25.n,d26.n)}</td></tr>`}
function uL1(id,pid,l,d25,d26,sc){const p25=d25.n?Math.round(d25.rev/d25.n):0,p26=d26.n?Math.round(d26.rev/d26.n):0;const k25n=storeNames(get25Names(sc)),k25r=storeRevs(get25PR(sc)),k26n=storeNames(get26Names(sc)),k26r=storeRevs(get26PR(sc));return`<tr class="r-lv1 expandable hidden" id="row_${id}" data-p="${pid}" onclick="toggle('${id}')"><td><span class="toggle">▶</span>${l}</td><td>${nc(d25.n,k25n,l+' 2025','coop')}</td><td>${rc(d25.rev,k25r,l+' 2025業績')}</td><td>${d25.n?fmt(p25):'<span class="g-na">-</span>'}</td><td>${nc(d26.n,k26n,l+' 2026','coop')}</td><td>${rc(d26.rev,k26r,l+' 2026業績')}</td><td>${d26.n?fmt(p26):'<span class="g-na">-</span>'}</td><td>${growthBadge(p25,p26,d25.n,d26.n)}</td></tr>`}
function uL1c(pid,l,d25,d26,sc){const p25=d25.n?Math.round(d25.rev/d25.n):0,p26=d26.n?Math.round(d26.rev/d26.n):0;const k25n=storeNames(get25Names(sc)),k25r=storeRevs(get25PR(sc)),k26n=storeNames(get26Names(sc)),k26r=storeRevs(get26PR(sc));return`<tr class="r-lv1 hidden" data-p="${pid}"><td>${l}</td><td>${nc(d25.n,k25n,l+' 2025','coop')}</td><td>${rc(d25.rev,k25r,l+' 2025業績')}</td><td>${d25.n?fmt(p25):'<span class="g-na">-</span>'}</td><td>${nc(d26.n,k26n,l+' 2026','coop')}</td><td>${rc(d26.rev,k26r,l+' 2026業績')}</td><td>${d26.n?fmt(p26):'<span class="g-na">-</span>'}</td><td>${growthBadge(p25,p26,d25.n,d26.n)}</td></tr>`}
function uL2(pid,l,d25,d26,sc){const p25=d25.n?Math.round(d25.rev/d25.n):0,p26=d26.n?Math.round(d26.rev/d26.n):0;const k25n=storeNames(get25Names(sc)),k25r=storeRevs(get25PR(sc)),k26n=storeNames(get26Names(sc)),k26r=storeRevs(get26PR(sc));return`<tr class="r-lv2 hidden" data-p="${pid}"><td>${l}</td><td>${nc(d25.n,k25n,l+' 2025','coop')}</td><td>${rc(d25.rev,k25r,l+' 2025業績')}</td><td>${d25.n?fmt(p25):'<span class="g-na">-</span>'}</td><td>${nc(d26.n,k26n,l+' 2026','coop')}</td><td>${rc(d26.rev,k26r,l+' 2026業績')}</td><td>${d26.n?fmt(p26):'<span class="g-na">-</span>'}</td><td>${growthBadge(p25,p26,d25.n,d26.n)}</td></tr>`}

// ── Toggle / Expand ──
function toggle(id){const row=document.getElementById('row_'+id);if(!row)return;const ch=document.querySelectorAll(`[data-p="${id}"]`);const isOpen=row.classList.contains('open');row.classList.toggle('open',!isOpen);ch.forEach(c=>{c.classList.toggle('hidden',isOpen);if(isOpen&&c.id){const cid=c.id.replace('row_','');document.querySelectorAll(`[data-p="${cid}"]`).forEach(g=>g.classList.add('hidden'));c.classList.remove('open')}})}
function penExpandAll(){document.querySelectorAll('#sec-pen .r-lv0,#sec-pen .r-lv1.expandable').forEach(r=>{const id=r.id?.replace('row_','');if(!id)return;r.classList.add('open');document.querySelectorAll(`[data-p="${id}"]`).forEach(c=>c.classList.remove('hidden'))})}
function penCollapseAll(){document.querySelectorAll('#sec-pen .r-lv0,#sec-pen .r-lv1.expandable').forEach(r=>r.classList.remove('open'));document.querySelectorAll('#sec-pen .r-lv1,#sec-pen .r-lv2').forEach(c=>c.classList.add('hidden'))}
function unitExpandAll(){document.querySelectorAll('#sec-unit .r-lv0,#sec-unit .r-lv1.expandable').forEach(r=>{const id=r.id?.replace('row_','');if(!id)return;r.classList.add('open');document.querySelectorAll(`[data-p="${id}"]`).forEach(c=>c.classList.remove('hidden'))})}
function unitCollapseAll(){document.querySelectorAll('#sec-unit .r-lv0,#sec-unit .r-lv1.expandable').forEach(r=>r.classList.remove('open'));document.querySelectorAll('#sec-unit .r-lv1,#sec-unit .r-lv2').forEach(c=>c.classList.add('hidden'))}

// ── Feature / Dim switch ──
function switchFeature(f){currentFeat=f;document.getElementById('sec-pen').style.display=f==='pen'?'':'none';document.getElementById('sec-unit').style.display=f==='unit'?'':'none';document.getElementById('fb-pen').classList.toggle('active',f==='pen');document.getElementById('fb-unit').classList.toggle('active',f==='unit')}
function switchPenDim(d){penDim=d;document.getElementById('view-pen-ag').style.display=d==='ag'?'':'none';document.getElementById('view-pen-cn').style.display=d==='cn'?'':'none';document.getElementById('tab-pen-ag').classList.toggle('active',d==='ag');document.getElementById('tab-pen-cn').classList.toggle('active',d==='cn');document.getElementById('pen-search').value='';updatePenCount()}
function switchUnitDim(d){unitDim=d;document.getElementById('view-unit-ag').style.display=d==='ag'?'':'none';document.getElementById('view-unit-cn').style.display=d==='cn'?'':'none';document.getElementById('tab-unit-ag').classList.toggle('active',d==='ag');document.getElementById('tab-unit-cn').classList.toggle('active',d==='cn');document.getElementById('unit-search').value='';updateUnitCount()}
function updatePenCount(){const v=penDim==='ag'?'view-pen-ag':'view-pen-cn';document.getElementById('pen-count').textContent=`共 ${document.querySelectorAll('#'+v+' .r-lv0').length} 個群組`}
function updateUnitCount(){const v=unitDim==='ag'?'view-unit-ag':'view-unit-cn';document.getElementById('unit-count').textContent=`共 ${document.querySelectorAll('#'+v+' .r-lv0').length} 個群組`}

// ── Search ──
function searchIn(scope,q){
  q=q.trim().toLowerCase();const sec=scope==='pen'?'#sec-pen':'#sec-unit';
  if(!q){if(scope==='pen')penCollapseAll();else unitCollapseAll();return}
  document.querySelectorAll(`${sec} .r-lv0`).forEach(r=>r.style.display='');
  document.querySelectorAll(`${sec} .r-lv1,${sec} .r-lv2`).forEach(r=>r.style.display='none');
  document.querySelectorAll(`${sec} .r-lv0,${sec} .r-lv1,${sec} .r-lv2`).forEach(row=>{
    const text=row.querySelector('td').textContent.toLowerCase();
    if(text.includes(q)){row.style.display='';let pid=row.dataset?.p;while(pid){const par=document.getElementById('row_'+pid);if(par){par.style.display='';par.classList.add('open')}document.querySelectorAll(`[data-p="${pid}"]`).forEach(s=>s.style.display='');pid=par?.dataset?.p}}
  })
}
function onPenSearch(v){searchIn('pen',v)}
function onUnitSearch(v){searchIn('unit',v)}

// ── Modal ──
function showDetail(key,title,type){
  const s=det[key];if(!s)return;_modalData=s;
  document.getElementById('modal-title').textContent=title;document.getElementById('modal-search').value='';
  if(s.type==='names'){document.getElementById('modal-sub').textContent=`${type==='coop'?'🤝 合作建案':type==='val'?'🔷 有價值建案':'🏢 在線建案'} — 共 ${s.items.length} 個`;renderNameList(s.items,'')}
  else if(s.type==='revs'){document.getElementById('modal-sub').textContent=`💰 業績明細 — 共 ${s.items.length} 個建案`;renderRevList(s.items,'')}
  document.getElementById('modal-overlay').classList.add('open')
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function filterModal(q){if(_modalData?.type==='names')renderNameList(_modalData.items,q);else if(_modalData?.type==='revs')renderRevList(_modalData.items,q)}
function renderNameList(items,q){const f=q?items.filter(n=>n.toLowerCase().includes(q.toLowerCase())):items;const list=document.getElementById('modal-list');if(!f.length){list.innerHTML='<div class="mod-empty">無符合結果</div>';return}list.innerHTML=f.map((n,i)=>`<div class="mod-item"><span class="mod-idx">${i+1}</span><span class="mod-name">${n}</span></div>`).join('');document.getElementById('modal-footer').textContent=q?`顯示 ${f.length} / ${items.length} 個`:`共 ${items.length} 個建案`}
function renderRevList(items,q){const f=q?items.filter(({p})=>p.toLowerCase().includes(q.toLowerCase())):items;const list=document.getElementById('modal-list');if(!f.length){list.innerHTML='<div class="mod-empty">無符合結果</div>';document.getElementById('modal-footer').textContent='無符合結果';return}const total=f.reduce((s,{r})=>s+r,0);list.innerHTML=f.map(({p,r},i)=>`<div class="mod-item"><span class="mod-idx">${i+1}</span><span class="mod-name">${p}</span><span class="mod-rev-val">${r.toLocaleString()}</span></div>`).join('');document.getElementById('modal-footer').innerHTML=`<div class="mod-total-row"><span>共 ${f.length} 個建案</span><span>合計：<strong>${total.toLocaleString()}</strong></span></div>`}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ── Growth ──
function growthFmt(p25,p26){if(!p25||!p26)return'-';const g=(p26/p25-1)*100;return(g>=0?'+':'')+g.toFixed(1)+'%'}
function growthBadge(p25,p26,n25,n26){if(!n25||!n26||!p25||!p26)return'<span class="g-na">-</span>';const g=(p26/p25-1)*100;return`<span class="${g>=0?'g-pos':'g-neg'}">${g>=0?'+':''}${g.toFixed(1)}%</span>`}

// ── Cell helpers ──
// nc: regular clickable count (blue)
function nc(n,key,title,type){if(!n)return`<span class="num-zero">0</span>`;return`<span class="num-link" onclick="event.stopPropagation();showDetail('${key}','${esc(title)}','${type}')">${n.toLocaleString()}</span>`}
// vc: valuable clickable count (purple)
function vc(n,key,title){if(!n)return`<span class="num-zero">0</span>`;return`<span class="val-link" onclick="event.stopPropagation();showDetail('${key}','${esc(title)}','val')">${n.toLocaleString()}</span>`}
// rc: revenue clickable (grey underline)
function rc(rev,key,title){if(!rev&&rev!==0)return`<span class="g-na">-</span>`;if(rev===0)return`<span class="num-zero">0</span>`;return`<span class="rev-link" onclick="event.stopPropagation();showDetail('${key}','${esc(title)}','rev')">${rev.toLocaleString()}</span>`}

// ── Common ──
function sid(s){return s.replace(/[\s(（）·)]/g,'_')}
function fmt(n){return n!=null?Number(n).toLocaleString():'-'}
function esc(s){return String(s).replace(/'/g,"&#39;").replace(/"/g,"&quot;")}
function pct(n,d){return d?(n/d*100).toFixed(1)+'%':'-'}
function rateClass(n,d){if(!d)return'none';const r=n/d;return r>=.15?'high':r>=.05?'mid':'low'}
function badge(n,d){if(!d)return'<span class="badge-none">-</span>';return`<span class="badge badge-${rateClass(n,d)}">${pct(n,d)}</span>`}
function barBadge(n,d){if(!d)return'<span class="badge-none">-</span>';const c=rateClass(n,d),w=Math.min(100,n/d*100).toFixed(1);return`<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill bar-${c}" style="width:${w}%"></div></div><span class="badge badge-${c}">${pct(n,d)}</span></div>`}
// Purple variants for 有価値
function valBadge(n,d){if(!d)return'<span class="badge-none">-</span>';const c=rateClass(n,d);return`<span class="badge badge-val-${c}">${pct(n,d)}</span>`}
function valBarBadge(n,d){if(!d)return'<span class="badge-none">-</span>';const c=rateClass(n,d),w=Math.min(100,n/d*100).toFixed(1);return`<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill bar-val-${c}" style="width:${w}%"></div></div><span class="badge badge-val-${c}">${pct(n,d)}</span></div>`}
</script>
